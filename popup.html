<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Classificador CNAE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #00e5a0;
      --accent2: #0091ff;
      --warn: #ffb800;
      --text: #e8eaf0;
      --muted: #6b7080;
      --service: #00e5a0;
      --commerce: #0091ff;
      --industry: #ffb800;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 580px;
      min-height: 400px;
      max-height: 700px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #000;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header span {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
    }

    .input-area {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      padding: 8px 16px;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      flex: 1;
    }
    .btn-primary:hover { background: #00ffb3; }

    .btn-secondary {
      background: var(--border);
      color: var(--muted);
    }
    .btn-secondary:hover { background: #333645; color: var(--text); }

    .btn-copy {
      background: var(--accent2);
      color: #fff;
    }
    .btn-copy:hover { background: #33aaff; }

    .results {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .results-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .summary-badges {
      display: flex;
      gap: 6px;
    }

    .badge {
      font-size: 10px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-service { background: rgba(0,229,160,0.15); color: var(--service); }
    .badge-commerce { background: rgba(0,145,255,0.15); color: var(--commerce); }
    .badge-industry { background: rgba(255,184,0,0.15); color: var(--industry); }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    td {
      padding: 7px 8px;
      border-bottom: 1px solid rgba(42,45,58,0.5);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .cnae-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .desc { font-size: 12px; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .tag-service { background: rgba(0,229,160,0.12); color: var(--service); }
    .tag-commerce { background: rgba(0,145,255,0.12); color: var(--commerce); }
    .tag-industry { background: rgba(255,184,0,0.12); color: var(--industry); }

    .annex {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
    .empty-state p { font-size: 12px; line-height: 1.6; }

    .toast {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 5px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab {
      flex: 1;
      padding: 9px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab:hover:not(.active) { color: var(--text); }

    .cnpj-row {
      display: flex;
      gap: 8px;
    }

    input[type=text] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type=text]:focus { border-color: var(--accent); }
    input[type=text]::placeholder { color: var(--muted); }

    .cnpj-info {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.7;
    }

    .cnpj-info .empresa { font-weight: 700; font-size: 13px; color: var(--accent); }
    .cnpj-info .info-row { color: var(--muted); }
    .cnpj-info .info-row span { color: var(--text); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 30px;
      color: var(--muted);
      font-size: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">CN</div>
  <h1>Classificador CNAE</h1>
  <span>Simples Nacional</span>
</header>

<div class="tabs">
  <button class="tab active" id="tabCnae">📋 CNAEs</button>
  <button class="tab" id="tabCnpj">🏢 CNPJ</button>
</div>

<!-- CNAE manual tab -->
<div id="panelCnae">
  <div class="input-area">
    <label>Cole os CNAEs aqui</label>
    <textarea id="input" placeholder="Ex: 47.81-4-00 - Comércio varejista de artigos do vestuário&#10;56.11-2-01 - Restaurantes e similares&#10;14.12-6-03 - Facção de peças do vestuário..."></textarea>
    <div class="actions">
      <button class="btn-primary" id="btnClassify">⚡ Classificar</button>
      <button class="btn-secondary" id="btnClear">Limpar</button>
      <button class="btn-copy" id="btnCopy" style="display:none">📋 Copiar tabela</button>
    </div>
  </div>
</div>

<!-- CNPJ tab -->
<div id="panelCnpj" style="display:none">
  <div class="input-area">
    <label>Digite o CNPJ</label>
    <div class="cnpj-row">
      <input type="text" id="cnpjInput" placeholder="00.000.000/0000-00" maxlength="18" />
      <button class="btn-primary" id="btnCnpj">🔍 Buscar</button>
    </div>
    <div id="cnpjInfo" class="cnpj-info" style="display:none"></div>
  </div>
</div>

<div class="results" id="results">
  <div class="empty-state">
    <div class="icon">🗂️</div>
    <p>Cole CNAEs ou busque pelo CNPJ.<br>A tabela será gerada com categoria e anexo.</p>
  </div>
</div>

<div class="toast" id="toast">Copiado!</div>

<script src="popup.js"></script>
</body>
</html>
